# Nginx configuration for WooPrice SSE endpoints
# Add this block inside your existing server {} block,
# BEFORE the general "location /" or "location /api/" block.
#
# All four SSE endpoints need these settings:
#   /api/fetch/full        — full catalog sync (can take 2-10 min)
#   /api/fetch/light       — incremental sync
#   /api/preview/stream    — preview flow
#   /api/sync/.../apply-stream — apply flow

location ~ ^/api/(fetch/(full|light)|preview/stream|sync/[0-9]+/apply-stream) {
    proxy_pass         http://127.0.0.1:8000;

    # Use HTTP/1.1 for upstream — HTTP/2 multiplexing causes RST_STREAM on
    # long-lived SSE connections in some nginx versions.
    proxy_http_version 1.1;

    # Clear the Connection header so nginx does not send "close" upstream.
    proxy_set_header   Connection "";

    # Forward real client IP and host.
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

    # Disable buffering — SSE events must be flushed immediately.
    proxy_buffering    off;
    proxy_cache        off;

    # Full sync can take several minutes on a large catalog.
    # Set well above the longest expected WooCommerce fetch time.
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
}
