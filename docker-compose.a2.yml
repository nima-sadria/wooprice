services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wooprice_a2
      POSTGRES_USER: wooprice_a2
      POSTGRES_PASSWORD: ${A2_POSTGRES_PASSWORD:-changeme}
    volumes:
      - a2_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    environment:
      - A2_DATABASE_URL=postgresql://wooprice_a2:${A2_POSTGRES_PASSWORD:-changeme}@postgres:5432/wooprice_a2
    depends_on:
      - postgres

volumes:
  a2_pgdata:
