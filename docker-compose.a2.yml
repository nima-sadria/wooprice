# A2 platform compose override — adds PostgreSQL for the A2 canonical product stack.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.a2.yml up -d --build
#
# The default `docker compose up -d --build` (docker-compose.yml only) starts the
# existing app without PostgreSQL and without any POSTGRES_URL requirement.
# This file must be explicitly specified to enable the A2 platform.

services:
  app:
    environment:
      - POSTGRES_URL=postgresql://wooprice:${POSTGRES_PASSWORD}@postgres:5432/wooprice_a2
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=wooprice_a2
      - POSTGRES_USER=wooprice
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wooprice -d wooprice_a2"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
