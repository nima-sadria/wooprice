[alembic]
# WooPrice Beta — Alembic configuration for Beta-only migrations
# Beta migration files: alembic_beta/versions/beta_NNN_*.py
# A2 migrations: use alembic_a2.ini
script_location = alembic_beta
# sqlalchemy.url is set at runtime from BETA_DATABASE_URL env var

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
