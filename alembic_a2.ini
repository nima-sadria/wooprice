[alembic]
script_location = alembic_a2
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC

# URL is supplied at runtime via A2_DATABASE_URL environment variable.
# This placeholder is overridden by alembic_a2/env.py.
sqlalchemy.url = sqlite:///:memory:

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
