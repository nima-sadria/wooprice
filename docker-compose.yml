services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    dns:
      - 192.168.100.1
      - 192.168.100.20
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/wooprice.db
      - POSTGRES_URL=postgresql://wooprice:${POSTGRES_PASSWORD}@postgres:5432/wooprice_a2
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=wooprice_a2
      - POSTGRES_USER=wooprice
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wooprice -d wooprice_a2"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
